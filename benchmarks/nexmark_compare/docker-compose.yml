# Kafka + Flink stack for the cross-engine Nexmark comparison. Cloned from
# benchmarks/flink_compare/docker-compose.yml. The Flink stanza (profile "flink")
# runs the upstream Apache Flink image; the harness verifies the Flink SQL path
# on that exact image. Kafka auto-creates topics (KAFKA_NUM_PARTITIONS sets the
# default partition count == the matched parallelism).
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=srvr,ruok"
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 | grep -q Zookeeper"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 4
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30

  # The upstream Apache Flink image. The harness verifies the Flink SQL +
  # flink-sql-connector-kafka path on this exact image (upstream nexmark-flink SQL
  # targeted Flink 1.x, so 2.2.0 compatibility is unverified - q0 is the canary).
  flink-jobmanager:
    image: flink:2.2.0-scala_2.12-java21
    profiles: ["flink"]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 4
        state.backend.type: hashmap

  flink-taskmanager:
    image: flink:2.2.0-scala_2.12-java21
    profiles: ["flink"]
    depends_on:
      - flink-jobmanager
    command: taskmanager
    scale: 1
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 4
        state.backend.type: hashmap

  # Containerized clink cluster (profile "clink") for distributed functional
  # verification: 1 coordinator + 4 workers, each its own container/hostname on this project
  # network, so subtasks shuffle over real container-to-container TCP (separate
  # network namespaces) and reach Kafka via the in-network listener kafka:29092.
  # Image built by verify_distributed.sh from docker/Dockerfile.runtime. coordinator HTTP
  # maps to host 8095 (8081 is taken by flink-jobmanager). 4 worker x 16 slots = 64,
  # enough for q8 at par=4 (~36 subtasks).
  clink-coordinator:
    image: clink-runtime:latest
    profiles: ["clink"]
    hostname: clink-coordinator
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - --role=coordinator
      - --port=6123
      - --bind-host=0.0.0.0
      - --advertise-host=clink-coordinator
      - --http-port=8081
      - --http-bind=0.0.0.0
    ports:
      - "8095:8081"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8081/api/v1/health"]
      interval: 2s
      timeout: 2s
      retries: 40
      start_period: 2s

  clink-worker1: &clink-worker
    image: clink-runtime:latest
    profiles: ["clink"]
    hostname: clink-worker1
    depends_on:
      clink-coordinator:
        condition: service_healthy
    command:
      - --role=worker
      - --id=worker-1
      - --coordinator-host=clink-coordinator
      - --coordinator-port=6123
      - --data-host=clink-worker1
      - --slots=16
      - --http-port=8082
      - --http-bind=0.0.0.0
    environment:
      CLINK_DATA_BIND_HOST: 0.0.0.0
    restart: on-failure

  clink-worker2:
    <<: *clink-worker
    hostname: clink-worker2
    command:
      - --role=worker
      - --id=worker-2
      - --coordinator-host=clink-coordinator
      - --coordinator-port=6123
      - --data-host=clink-worker2
      - --slots=16
      - --http-port=8082
      - --http-bind=0.0.0.0

  clink-worker3:
    <<: *clink-worker
    hostname: clink-worker3
    command:
      - --role=worker
      - --id=worker-3
      - --coordinator-host=clink-coordinator
      - --coordinator-port=6123
      - --data-host=clink-worker3
      - --slots=16
      - --http-port=8082
      - --http-bind=0.0.0.0

  clink-worker4:
    <<: *clink-worker
    hostname: clink-worker4
    command:
      - --role=worker
      - --id=worker-4
      - --coordinator-host=clink-coordinator
      - --coordinator-port=6123
      - --data-host=clink-worker4
      - --slots=16
      - --http-port=8082
      - --http-bind=0.0.0.0
