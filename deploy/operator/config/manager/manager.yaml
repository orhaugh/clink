apiVersion: v1
kind: Namespace
metadata:
  name: clink-operator-system
  labels:
    app.kubernetes.io/name: clink-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clink-operator-controller
  namespace: clink-operator-system
  labels:
    app.kubernetes.io/name: clink-operator
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clink-operator
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clink-operator
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: clink-operator-controller
      securityContext:
        runAsNonRoot: true
      containers:
        - name: manager
          image: clink-operator:latest
          imagePullPolicy: IfNotPresent
          args:
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:8080
          ports:
            - name: metrics
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      terminationGracePeriodSeconds: 10
