{{- if and .Values.ha.enabled (eq .Values.ha.storage.type "pvc") }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "clink.haPvcName" . }}
  labels:
    {{- include "clink.labels" . | nindent 4 }}
spec:
  # Shared by every Coordinator and Worker pod for leader election +
  # job-manifest persistence, so it MUST be ReadWriteMany on a multi-node
  # cluster (needs an RWX-capable StorageClass).
  accessModes:
    - ReadWriteMany
  {{- if .Values.ha.storage.pvc.storageClassName }}
  storageClassName: {{ .Values.ha.storage.pvc.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.ha.storage.pvc.size }}
{{- end }}
