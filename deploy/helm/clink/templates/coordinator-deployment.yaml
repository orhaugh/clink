apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clink.coordinator.fullname" . }}
  labels:
    {{- include "clink.labels" . | nindent 4 }}
    app.kubernetes.io/component: coordinator
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  # Non-HA: a single Coordinator. HA (ha.enabled): replicas race an fcntl lock on
  # the shared --ha-dir; the winner binds the control port and is leader,
  # standbys wait, and a standby takes over on leader death. See values.ha.
  replicas: {{ if .Values.ha.enabled }}{{ .Values.ha.replicas }}{{ else }}1{{ end }}
  strategy:
    {{- if .Values.ha.enabled }}
    type: RollingUpdate
    {{- else }}
    type: Recreate
    {{- end }}
  selector:
    matchLabels:
      {{- include "clink.componentSelectorLabels" (dict "root" . "component" "coordinator") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "clink.labels" . | nindent 8 }}
        app.kubernetes.io/component: coordinator
      {{- with .Values.coordinator.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "clink.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: coordinator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.ha.enabled }}
          env:
            # In HA the leader advertises its OWN reachable address (peers +
            # workers read it from active-leader.json), not the round-robin Service.
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          {{- end }}
          args:
            - --role=coordinator
            - --port={{ .Values.coordinator.controlPort }}
            - --bind-host=0.0.0.0
            {{- if .Values.ha.enabled }}
            - --advertise-host=$(POD_IP)
            - --ha-dir={{ .Values.ha.storage.mountPath }}
            {{- else }}
            # workers reach the coordinator via this Service DNS name; the coordinator advertises it.
            - --advertise-host={{ include "clink.coordinator.fullname" . }}
            {{- end }}
            - --http-port={{ .Values.coordinator.httpPort }}
            - --http-bind=0.0.0.0
            {{- if .Values.coordinator.stateBackend }}
            - --state-backend={{ .Values.coordinator.stateBackend }}
            {{- end }}
            {{- with .Values.coordinator.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: control
              containerPort: {{ .Values.coordinator.controlPort }}
            - name: http
              containerPort: {{ .Values.coordinator.httpPort }}
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          {{- with .Values.coordinator.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.ha.enabled }}
          volumeMounts:
            {{- include "clink.haVolumeMount" . | nindent 12 }}
          {{- end }}
      {{- if .Values.ha.enabled }}
      volumes:
        {{- include "clink.haVolume" . | nindent 8 }}
      {{- end }}
      {{- with .Values.coordinator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.coordinator.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.coordinator.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
