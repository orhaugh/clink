apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "clink.worker.fullname" . }}
  labels:
    {{- include "clink.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  serviceName: {{ include "clink.worker.headless" . }}
  replicas: {{ .Values.worker.replicas }}
  # workers are independent; start/stop them in parallel rather than one ordinal
  # at a time.
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "clink.componentSelectorLabels" (dict "root" . "component" "worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "clink.labels" . | nindent 8 }}
        app.kubernetes.io/component: worker
      {{- with .Values.worker.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "clink.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.worker.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        # k8s has no compose-style depends_on; without this gate the worker races
        # the Coordinator's bind, fails connect_to_coordinator, exits, and crash-loops
        # until the coordinator is up. Wait for the coordinator's health endpoint (the same
        # readiness signal compose used) before starting clink_node.
        - name: wait-for-coordinator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              until curl -fsS "http://{{ include "clink.coordinator.fullname" . }}:{{ .Values.coordinator.httpPort }}/api/v1/health" >/dev/null 2>&1; do
                echo "waiting for coordinator..."
                sleep 2
              done
              echo "coordinator is ready"
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            # Stable ordinal pod name -> stable worker id across restarts.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # The worker advertises its own pod IP for the data plane; reachable
            # cluster-wide on the flat pod network.
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            # Bind the data-plane listener on all interfaces so peer pods can
            # connect (the default 127.0.0.1 is single-host only).
            - name: CLINK_DATA_BIND_HOST
              value: "0.0.0.0"
          args:
            - --role=worker
            - --id=$(POD_NAME)
            - --coordinator-host={{ include "clink.coordinator.fullname" . }}
            - --coordinator-port={{ .Values.coordinator.controlPort }}
            - --data-host=$(POD_IP)
            - --slots={{ .Values.worker.slots }}
            - --http-port={{ .Values.worker.httpPort }}
            - --http-bind=0.0.0.0
            {{- if .Values.ha.enabled }}
            # In HA the worker discovers the current leader from the shared
            # active-leader.json (overriding --coordinator-host) and re-discovers after a
            # leader change when k8s restarts it on coordinator disconnect.
            - --ha-dir={{ .Values.ha.storage.mountPath }}
            {{- end }}
            {{- with .Values.worker.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.worker.httpPort }}
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          {{- with .Values.worker.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.ha.enabled }}
          volumeMounts:
            {{- include "clink.haVolumeMount" . | nindent 12 }}
          {{- end }}
      {{- if .Values.ha.enabled }}
      volumes:
        {{- include "clink.haVolume" . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
