apiVersion: v1
kind: Service
metadata:
  name: {{ include "clink.jobmanager.fullname" . }}
  labels:
    {{- include "clink.labels" . | nindent 4 }}
    app.kubernetes.io/component: jobmanager
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.jobmanager.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.jobmanager.service.type }}
  selector:
    {{- include "clink.componentSelectorLabels" (dict "root" . "component" "jobmanager") | nindent 4 }}
  ports:
    - name: control
      port: {{ .Values.jobmanager.controlPort }}
      targetPort: control
      protocol: TCP
    - name: http
      port: {{ .Values.jobmanager.httpPort }}
      targetPort: http
      protocol: TCP
