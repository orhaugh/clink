# Default values for the clink chart.

image:
  # The clink runtime image (built from docker/Dockerfile.runtime). Push it to a
  # registry your cluster can pull, then set repository/tag here.
  repository: clink-runtime
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Extra labels/annotations applied to every object.
commonLabels: {}
commonAnnotations: {}

serviceAccount:
  # Create a ServiceAccount for the pods. A future etcd/k8s-native HA mode that
  # uses leader election will need RBAC on this account.
  create: true
  name: ""
  annotations: {}

jobmanager:
  # The control plane is a single leader. v1 runs ONE JobManager (HA multi-JM
  # leader election is a documented follow-on - see ha below). Pinned to 1.
  controlPort: 6123
  httpPort: 8081
  service:
    # ClusterIP keeps the dashboard in-cluster. Use NodePort/LoadBalancer (or an
    # Ingress) to expose http externally; the control port should stay internal.
    type: ClusterIP
    annotations: {}
  # Extra clink_node args, e.g. ["--heartbeat-timeout-ms=8000"].
  extraArgs: []
  # State backend URI passed as --state-backend (empty = node default). e.g.
  # "s3+rocksdb://bucket/prefix?..." for disaggregated state.
  stateBackend: ""
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

taskmanager:
  replicas: 3
  # Task slots per TaskManager (parallelism capacity).
  slots: 4
  httpPort: 8082
  extraArgs: []
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  # How long to let an in-flight subtask drain on pod termination before SIGKILL.
  terminationGracePeriodSeconds: 30

# High availability: run multiple JobManager replicas with leader election.
#
# Uses clink's FILE coordinator (always compiled into clink_node, no extra
# dependency): every JM races an fcntl lock on a SHARED --ha-dir; the winner
# binds the control port and writes its endpoint to active-leader.json, standbys
# wait, and TaskManagers discover the leader from that same shared dir. On
# leader death a standby acquires the lock and takes over.
#
# REQUIRES shared storage mounted by every JM and TM pod:
#   storage.type=pvc  : a ReadWriteMany PVC (production; needs an RWX-capable
#                       StorageClass - NFS/CephFS/etc). fcntl over a network FS
#                       carries a stale-lock risk under pathological hangs.
#   storage.type=hostPath: a node-local path shared by co-located pods. Correct
#                       ONLY on a single-node cluster (kind/minikube/dev).
#
# (The etcd coordinator is the more robust multi-machine election primitive but
# needs a clink_node built with -DCLINK_WITH_ETCD=ON + etcd-cpp-apiv3, which the
# default runtime image is not - so it is a documented follow-on, not wired here.)
ha:
  enabled: false
  # JobManager replica count (the leader + standbys).
  replicas: 2
  storage:
    type: pvc            # pvc | hostPath
    mountPath: /var/lib/clink/ha
    pvc:
      # MUST be ReadWriteMany-capable for a real multi-node cluster.
      storageClassName: ""
      size: 1Gi
    hostPath:
      # Single-node only (kind/dev). All pods share this node path.
      path: /var/lib/clink-ha
