# CI for clink.
#
# Everything runs inside the pinned toolchain image (docker/Dockerfile),
# which compiles Apache Arrow/Parquet + iceberg-cpp from source at the
# exact versions in scripts/versions.env. This matters: CMakeLists.txt
# asserts the linked Arrow is that pinned version with a FATAL_ERROR, so
# a distro `libarrow-dev` (a different version) cannot configure the
# build at all. The `toolchain-image` job builds that image once and
# pushes it to GHCR (layer-cached, so only a versions.env / script change
# pays the ~20-30 min from-source rebuild); the other jobs run in it.
#
# Jobs and what gates the pipeline:
#   toolchain-image - build + push the pinned image (cached). Push events
#                     only; pull_request runs reuse the :main image.     [gate]
#   build           - build with SQL + WASM + integration on; the unit + SQL
#                     ctest run is the hard gate, the multi-process integration
#                     run is advisory (see the step comments).           [gate + advisory step]
#   install-smoke   - install + consume from an out-of-tree find_package. [gate]
#   release-sql-runtime - the two live queryable-state HTTP tests, built in
#                     Release (they need optimized throughput; the Debug gate
#                     excludes them).                                    [gate]
#
# So a green pipeline requires: the pinned image builds, the full tree builds,
# the unit + SQL suite passes, install-smoke consumes clink, and the Release
# queryable-state HTTP tests pass. The integration step runs advisory until
# its pre-existing timing tail is triaged. The sanitizer matrix is a separate
# MANUAL workflow (sanitizers.yml) - over an hour per mode, too heavy per push.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  # Owner-scoped so a fork builds under its own namespace.
  IMAGE: ghcr.io/${{ github.repository_owner }}/clink-build

jobs:
  toolchain-image:
    name: Pinned toolchain image
    # Push events only: on a pull_request run (fork or same-repo) the
    # GITHUB_TOKEN is read-only for packages, so the GHCR push would 403.
    # PR runs skip this job and consume the image from the latest main
    # build via the `:main` moving tag pushed below. Consequence: a PR that
    # changes the toolchain inputs (docker/Dockerfile, scripts/versions.env,
    # the setup scripts) is tested against the pre-change image until it
    # lands on main; CONTRIBUTING.md tells authors to flag such PRs.
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    outputs:
      ref: ${{ steps.meta.outputs.ref }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: echo "ref=${IMAGE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push pinned image (layer-cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          # The per-SHA tag pins this run; the `:main` moving tag is what
          # pull_request runs (which skip this job) pull instead.
          tags: |
            ${{ steps.meta.outputs.ref }}
            ${{ env.IMAGE }}:main
          # Registry-backed layer cache: the expensive from-source Arrow /
          # aws-sdk / iceberg-cpp layers are reused across runs and only
          # rebuilt when their COPYed scripts change (see docker/Dockerfile).
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

  build:
    name: Build + full ctest
    runs-on: ubuntu-24.04
    needs: toolchain-image
    # Run when the image job succeeded (push) or was skipped (pull_request);
    # in the skipped case fall back to the `:main` image.
    if: ${{ !cancelled() && (needs.toolchain-image.result == 'success' || needs.toolchain-image.result == 'skipped') }}
    container:
      image: ${{ needs.toolchain-image.outputs.ref || format('ghcr.io/{0}/clink-build:main', github.repository_owner) }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      # root: the image's default user is non-root, but the runner mounts its
      # file-command dirs root-owned, so checkout dies with EACCES otherwise
      # (same reason the sanitizer job runs as root).
      options: --user root
    env:
      # The image bakes the pinned toolchain at /usr/local; this tells the
      # build to resolve it there instead of the host ~/.clink-deps path.
      CLINK_DEPS_PREFIX: /usr/local
      # Compiler cache: the FetchContent deps (RocksDB above all) and clink's
      # own TUs rebuild from cold otherwise. CMake reads the launcher from the
      # environment, so no script changes are needed.
      CCACHE_DIR: /root/.ccache
      CCACHE_MAXSIZE: 1500M
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
    steps:
      - uses: actions/checkout@v4
      - name: Mark workspace safe for git
        # The checkout's safe.directory entry lands in the action user's HOME,
        # which differs from the run-step HOME in a container job; without
        # this every git call in the build (the plugin ABI hash reads the
        # HEAD SHA) fails with 'dubious ownership'.
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Install ccache
        run: apt-get update -q && apt-get install -y -q --no-install-recommends ccache
      - name: Restore compiler cache
        # restore/save are split (not the combined action) so a FAILED run
        # still saves its objects - that is what keeps fix iterations fast.
        uses: actions/cache/restore@v4
        with:
          path: /root/.ccache
          key: ccache-build-${{ github.run_id }}
          restore-keys: ccache-build-
      - name: Disk before build
        run: df -h /
      - name: Configure
        run: |
          # Full surface: SQL frontend, WASM UDFs, and the multi-process
          # integration suite all on. CLINK_WITH_WASM=ON fetches the pinned
          # wasmtime c-api. Integer parallelism cap keeps cc1plus off the OOM
          # line on the heavy templated TUs.
          #
          # Debug info is dropped (-g0) and every binary is stripped at link
          # (-s): the pinned toolchain image already fills ~61 GB of the
          # runner's 72 GB disk, leaving ~12 GB, and a normal Debug build's
          # ~30 test executables each statically link debug-laden Arrow and
          # overflowed it while linking. -g0 keeps -O0 and assertions (the
          # point of the Debug gate) but emits no DWARF; -s strips the final
          # binaries so the debug info pulled in from the static deps never
          # lands on disk. Behaviour is unchanged (the suite is 3023/3023
          # either way); only symbols/line-tables are gone. To debug a CI
          # failure interactively, reproduce locally without these flags.
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug \
            -DCLINK_BUILD_TESTS=ON \
            -DCLINK_BUILD_SQL=ON \
            -DCLINK_WITH_WASM=ON \
            -DCLINK_INTEGRATION_TESTS=ON \
            -DCMAKE_C_FLAGS_DEBUG=-g0 \
            -DCMAKE_CXX_FLAGS_DEBUG=-g0 \
            -DCMAKE_EXE_LINKER_FLAGS=-s \
            -DCMAKE_SHARED_LINKER_FLAGS=-s
      - name: Build
        run: cmake --build build -j "$(( $(nproc) / 2 ))"
      - name: Test (unit, parallel) [blocking gate]
        # The fast unit surface: everything except the sql, integration, and
        # benchmark labels. Parallel at the runner's core count - NOT a fixed
        # -j8, which 4x-oversubscribes a 4-core runner and starves the
        # timing-sensitive multi-process tests into spurious timeouts.
        # benchmark is excluded entirely: throughput/timing asserts are
        # meaningless on a shared runner in a Debug (-O0) build and belong to
        # the perf harness on real hardware.
        run: ctest --test-dir build --output-on-failure -j "$(nproc)" --timeout 180 -LE 'integration|benchmark|sql'
      - name: Test (SQL, low parallelism) [blocking gate]
        # The SQL surface, incl. runtime ITs that stand up in-process
        # coordinator/worker clusters and HTTP servers, at -j2 to avoid the
        # CPU oversubscription that timed them out under the old -j8.
        #
        # Two live queryable-state HTTP tests are excluded: they run a
        # 1.5M-row job and poll for live/exported state over HTTP within a
        # fixed in-test deadline, which needs an optimized build's throughput.
        # In this -O0 Debug gate on a shared runner the job is simply too slow
        # to surface state in time (not a correctness fault - the non-
        # checkpointing LiveGroupBy variant times out the same way). They
        # gate in local and Release runs; a dedicated Release CI job is the
        # right home for them and is tracked as follow-up.
        run: >-
          ctest --test-dir build --output-on-failure -j 2 --timeout 300
          -L sql -LE integration
          -E 'SqlQueryableState\.Live(GroupByStateServedOverHttp|WholeJobStateExportOverHttp)'
      - name: Test (integration, serial) [advisory]
        # Multi-process integration tests (incl. the exactly-once failover
        # test). Advisory until the pre-existing multi-process flakiness is
        # triaged: some spawn/kill cluster tests are timing-sensitive and at
        # least one (RecoveryCommitsPreCommittedFilesOnRestart) fails on macOS
        # with a submit-RPC race; their Linux status is not yet established.
        # continue-on-error surfaces the results (and any NEW regression) as a
        # warning without red-lighting the gate.
        continue-on-error: true
        run: ctest --test-dir build --output-on-failure --parallel 1 --timeout 240 -L integration
      - name: ccache stats
        if: always()
        run: ccache -s
      - name: Save compiler cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /root/.ccache
          key: ccache-build-${{ github.run_id }}

  install-smoke:
    name: Install + downstream consume
    runs-on: ubuntu-24.04
    needs: toolchain-image
    if: ${{ !cancelled() && (needs.toolchain-image.result == 'success' || needs.toolchain-image.result == 'skipped') }}
    container:
      image: ${{ needs.toolchain-image.outputs.ref || format('ghcr.io/{0}/clink-build:main', github.repository_owner) }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      # root: see the build job - the runner's mounted dirs are root-owned.
      options: --user root
    env:
      CLINK_DEPS_PREFIX: /usr/local
      CCACHE_DIR: /root/.ccache
      CCACHE_MAXSIZE: 1500M
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
    steps:
      - uses: actions/checkout@v4
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Install ccache
        run: apt-get update -q && apt-get install -y -q --no-install-recommends ccache
      - name: Restore compiler cache
        uses: actions/cache/restore@v4
        with:
          path: /root/.ccache
          key: ccache-install-${{ github.run_id }}
          restore-keys: ccache-install-
      - name: Build + install clink
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DCLINK_BUILD_TESTS=OFF -DCLINK_BUILD_EXAMPLES=OFF
          cmake --build build -j "$(( $(nproc) / 2 ))"
          cmake --install build --prefix /usr/local
      - name: Tiny downstream find_package smoke
        run: |
          mkdir -p /tmp/smoke && cd /tmp/smoke
          cat > CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.24)
          project(smoke CXX)
          set(CMAKE_CXX_STANDARD 23)
          find_package(clink CONFIG REQUIRED COMPONENTS core)
          add_executable(smoke smoke.cpp)
          target_link_libraries(smoke PRIVATE clink::core)
          EOF
          cat > smoke.cpp <<'EOF'
          #include <clink/api/pipeline.hpp>
          int main() {
              clink::api::Pipeline p;
              return p.graph().ops.size() == 0 ? 0 : 1;
          }
          EOF
          cmake -S . -B build
          cmake --build build
      - name: Consumer examples from the installed package
        # The maintained consumer surface, built downstream-style: a plain
        # find_package(clink COMPONENTS core test_support) project. This is
        # what keeps the exported test framework (clink::test_support) and
        # the component-gated dependency resolution consumable - 09 runs as
        # a self-checking test of the harnesses from the install prefix.
        run: |
          cmake -S docs/consumer-examples -B /tmp/consumer-examples
          cmake --build /tmp/consumer-examples -j "$(( $(nproc) / 2 ))"
          /tmp/consumer-examples/09_testing_framework
      - name: Save compiler cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /root/.ccache
          key: ccache-install-${{ github.run_id }}

  release-sql-runtime:
    # Gates the two live queryable-state HTTP tests that the Debug gate
    # excludes: they run a 1.5M-row job and poll for live / checkpoint-exported
    # state over HTTP within a fixed in-test deadline, which only an optimized
    # build's throughput meets. This job builds JUST the SQL test target in
    # Release (one binary, so it fits the disk without the full-tree strip
    # dance) and runs exactly those two tests as a blocking gate.
    name: Release SQL runtime ITs
    runs-on: ubuntu-24.04
    needs: toolchain-image
    if: ${{ !cancelled() && (needs.toolchain-image.result == 'success' || needs.toolchain-image.result == 'skipped') }}
    container:
      image: ${{ needs.toolchain-image.outputs.ref || format('ghcr.io/{0}/clink-build:main', github.repository_owner) }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      # root: see the build job - the runner's mounted dirs are root-owned.
      options: --user root
    env:
      CLINK_DEPS_PREFIX: /usr/local
      CCACHE_DIR: /root/.ccache
      CCACHE_MAXSIZE: 1500M
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
    steps:
      - uses: actions/checkout@v4
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Install ccache
        run: apt-get update -q && apt-get install -y -q --no-install-recommends ccache
      - name: Restore compiler cache
        uses: actions/cache/restore@v4
        with:
          path: /root/.ccache
          key: ccache-release-sql-${{ github.run_id }}
          restore-keys: ccache-release-sql-
      - name: Configure (Release, SQL on)
        # -s strips the one test binary at link: the image's static Arrow
        # carries debug info that Release would otherwise pull in whole.
        run: |
          # Examples stay ON (default): some test targets reference example
          # job plugins via generator expressions, so they must be defined at
          # configure time. Only clink_sql_tests is actually built below, so
          # the example binaries never link and cost no disk.
          cmake -S . -B build-release -DCMAKE_BUILD_TYPE=Release \
            -DCLINK_BUILD_TESTS=ON \
            -DCLINK_BUILD_SQL=ON \
            -DCMAKE_EXE_LINKER_FLAGS=-s
      - name: Build the SQL test target only
        run: cmake --build build-release --target clink_sql_tests -j "$(nproc)"
      - name: Test (live queryable-state HTTP, Release) [blocking gate]
        # Serial: each test stands up its own coordinator+worker+HTTP cluster.
        run: >-
          ctest --test-dir build-release --output-on-failure -j 1 --timeout 300
          -R 'SqlQueryableState\.Live(GroupByStateServedOverHttp|WholeJobStateExportOverHttp)'
      - name: ccache stats
        if: always()
        run: ccache -s
      - name: Save compiler cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /root/.ccache
          key: ccache-release-sql-${{ github.run_id }}

  # The sanitizer matrix lives in its own manually-triggered workflow
  # (sanitizers.yml): a full asan/tsan/ubsan pass takes over an hour per mode
  # on the hosted runners, far too heavy to pay on every push. Run it with
  #   gh workflow run sanitizers.yml -f mode=all      (or asan|tsan|ubsan)
  # or from the Actions tab, ideally before a release or after touching
  # concurrency/memory-sensitive code.
