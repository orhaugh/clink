# Sidecar services for the connector LIVE integration tests. These tests are
# SKIPPED unless their endpoint env var is set, so the normal build/test run
# never needs this.
#
# The one-command path is scripts/run-all-live.sh. It does NOT bring all of these
# up at once - it builds clink once (no services running), then for EACH connector
# brings up ONLY that connector's service(s), runs its live tests, and tears them
# down before the next. So this compose file is the menu of services the runner
# draws from per connector, not a set to start together.
#
# Manual usage for ONE connector (host, published ports) - e.g. redis:
#   docker compose -f docker/integration-services.yml up -d --wait redis
#   export CLINK_REDIS_TEST_URL=redis://localhost:6379
#   ctest --test-dir build -R 'RedisLive|RedisUpsertSinkLive' --output-on-failure
#   docker compose -f docker/integration-services.yml rm -sf redis
# Or just run one connector through the orchestrator: ONLY=redis scripts/run-all-live.sh
#
# (LocalStack accepts any credentials; the dummy test/test keys the runner sets
#  just let the AWS SDK sign requests.)

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false   # plain http on 9200 for the test
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  localstack:
    image: localstack/localstack:3
    environment:
      - SERVICES=kinesis,s3
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4566/_localstack/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  # Redis for the Redis Streams connector live IT.
  # URL: redis://localhost:6379
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 3s

  # Cassandra for the Cassandra connector live ITs (sink + changelog upsert sink).
  # CLINK_CASSANDRA_TEST_CONTACT_POINTS: "127.0.0.1"
  cassandra:
    image: cassandra:4
    ports:
      - "9042:9042"
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "SELECT cluster_name FROM system.local"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s

  # MySQL for the MySQL connector live ITs (both the cursor source/sink and the
  # binlog CDC source). The binlog flags enable replication: ROW format with full
  # before/after images and a server-id, so mysql_cdc_source can stream changes.
  # DSN: "host=localhost port=3306 user=root password=mysql database=test"
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: test
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pmysql"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 10s

  # Postgres with logical replication for the CDC source live IT.
  # DSN: "host=localhost port=5432 user=postgres password=postgres dbname=postgres"
  postgres-cdc:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD=postgres
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
      # Enable two-phase commit (PREPARE TRANSACTION) for the postgres
      # exactly-once sink live IT; defaults to 0 (disabled).
      - -c
      - max_prepared_transactions=10
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 5s

  # Google Cloud Pub/Sub emulator for the Pub/Sub connector live IT. Speaks the
  # same REST API as the service; the test creates its own topic + subscription.
  # CLINK_PUBSUB_EMULATOR_HOST: "localhost:8085"
  pubsub:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    command:
      - gcloud
      - beta
      - emulators
      - pubsub
      - start
      - --host-port=0.0.0.0:8085
    ports:
      - "8085:8085"

  # MongoDB as a single-node REPLICA SET (the CDC change-stream source requires
  # one). scripts/run-all-live.sh runs rs.initiate after startup with the member
  # host set to the service DNS name, so the driver on the compose network
  # discovers it. CLINK_MONGODB_TEST_URI: "mongodb://mongodb:27017/?replicaSet=rs0"
  mongodb:
    image: mongo:7
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  # NATS with JetStream enabled (the sink/source use JetStream streams).
  # Monitoring on 8222 gives a /healthz readiness probe (the nats image has no
  # shell, so no container healthcheck; run-all-live.sh probes /healthz).
  # CLINK_NATS_TEST_ENDPOINT: "nats://nats:4222"
  nats:
    image: nats:2.10
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  # Mosquitto MQTT broker, anonymous plain 1883 (see docker/mosquitto.conf).
  # CLINK_MQTT_TEST_URL: "mqtt://mqtt:1883"
  mqtt:
    image: eclipse-mosquitto:2
    command: ["mosquitto", "-c", "/mosquitto/config/mosquitto.conf"]
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "1883:1883"

  # InfluxDB 2.x for the influxdb sink live IT. Init mode pre-creates the org,
  # bucket and admin token the test defaults to (clink / clink / clink-token), so
  # no manual setup is needed. CLINK_INFLUXDB_TEST_ENDPOINT: "http://influxdb:8086"
  influxdb:
    image: influxdb:2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: clink
      DOCKER_INFLUXDB_INIT_PASSWORD: clink-password
      DOCKER_INFLUXDB_INIT_ORG: clink
      DOCKER_INFLUXDB_INIT_BUCKET: clink
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: clink-token
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD-SHELL", "influx ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  # RabbitMQ for the AMQP source/sink live IT. The default 'guest' user is
  # loopback-only (a networked client is refused), so create a real user via
  # RABBITMQ_DEFAULT_USER/PASS that CAN connect remotely; the test uses it via
  # CLINK_RABBITMQ_TEST_USER/PASSWORD. CLINK_RABBITMQ_TEST_ENDPOINT: "rabbitmq"
  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: clink
      RABBITMQ_DEFAULT_PASS: clink
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 15s

  # Apache Pulsar standalone for the pulsar source/sink live IT. Topics are
  # auto-created on subscribe, so no admin setup is needed; -nfw/-nss drop the
  # functions worker + stream storage to speed startup. Admin REST on 8080 gives a
  # readiness probe. CLINK_PULSAR_TEST_ENDPOINT: "pulsar://pulsar:6650"
  pulsar:
    image: apachepulsar/pulsar:3.3.1
    command: ["bin/pulsar", "standalone", "-nfw", "-nss"]
    ports:
      - "6650:6650"
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/admin/v2/brokers/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 40
      start_period: 20s
