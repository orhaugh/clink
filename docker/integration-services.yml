# Sidecar services for the connector LIVE integration tests (Elasticsearch +
# Kinesis-over-LocalStack). These tests are SKIPPED unless their endpoint env var
# is set, so the normal build/test run never needs this.
#
# Usage:
#   docker compose -f docker/integration-services.yml up -d
#   export CLINK_ELASTICSEARCH_TEST_ENDPOINT=http://localhost:9200
#   export CLINK_KINESIS_TEST_ENDPOINT=http://localhost:4566
#   export AWS_ACCESS_KEY_ID=test AWS_SECRET_ACCESS_KEY=test AWS_DEFAULT_REGION=us-east-1
#   export CLINK_REDIS_TEST_URL=redis://localhost:6379
#   export CLINK_MYSQL_TEST_DSN="host=localhost port=3306 user=root password=mysql database=test"
#   ctest --test-dir build -L http_connector -R Live --output-on-failure
#   ctest --test-dir build -L aws          -R Live --output-on-failure
#   ctest --test-dir build -L redis        -R Live --output-on-failure
#   ctest --test-dir build -L mysql        -R Live --output-on-failure
#   docker compose -f docker/integration-services.yml down -v
#
# (LocalStack accepts any credentials; the dummy test/test keys above just let
#  the AWS SDK sign requests.)

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false   # plain http on 9200 for the test
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  localstack:
    image: localstack/localstack:3
    environment:
      - SERVICES=kinesis
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4566/_localstack/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  # Redis for the Redis Streams connector live IT.
  # URL: redis://localhost:6379
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 3s

  # Cassandra for the Cassandra connector live ITs (sink + changelog upsert sink).
  # CLINK_CASSANDRA_TEST_CONTACT_POINTS: "127.0.0.1"
  cassandra:
    image: cassandra:4
    ports:
      - "9042:9042"
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "SELECT cluster_name FROM system.local"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s

  # MySQL for the MySQL connector live ITs (both the cursor source/sink and the
  # binlog CDC source). The binlog flags enable replication: ROW format with full
  # before/after images and a server-id, so mysql_cdc_source can stream changes.
  # DSN: "host=localhost port=3306 user=root password=mysql database=test"
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: test
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pmysql"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 10s

  # Postgres with logical replication for the CDC source live IT.
  # DSN: "host=localhost port=5432 user=postgres password=postgres dbname=postgres"
  postgres-cdc:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD=postgres
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
      # Enable two-phase commit (PREPARE TRANSACTION) for the postgres
      # exactly-once sink live IT; defaults to 0 (disabled).
      - -c
      - max_prepared_transactions=10
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 5s

  # Google Cloud Pub/Sub emulator for the Pub/Sub connector live IT. Speaks the
  # same REST API as the service; the test creates its own topic + subscription.
  # CLINK_PUBSUB_EMULATOR_HOST: "localhost:8085"
  pubsub:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    command:
      - gcloud
      - beta
      - emulators
      - pubsub
      - start
      - --host-port=0.0.0.0:8085
    ports:
      - "8085:8085"
