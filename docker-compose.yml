# clink local cluster - 1 Coordinator + 3 Workers.
#
# Usage:
#   # one-time: build the toolchain image (~15 min cold)
#   docker build -t clink-build:latest -f docker/Dockerfile .
#
#   # build runtime image and bring up the cluster
#   docker compose up --build
#
#   # browse the dashboard
#   open http://localhost:8081
#
# Tear down with `docker compose down`. To run a job against this
# cluster, target coordinator:6123 from another container on the `clink`
# network, or expose the coordinator control port to the host by adding
# "6123:6123" to the coordinator service's `ports:` list.

services:
  coordinator:
    build:
      context: .
      dockerfile: docker/Dockerfile.runtime
    image: clink-runtime:latest
    hostname: coordinator
    command:
      - --role=coordinator
      - --port=6123
      - --bind-host=0.0.0.0
      - --advertise-host=coordinator
      - --http-port=8081
      - --http-bind=0.0.0.0
      # Allow the standalone console (Vite dev server on another origin) to call
      # the API directly. The dev proxy works without this too; it is here so
      # opening the console straight against http://localhost:8081 also works.
      - --http-cors-origin=*
    ports:
      - "8081:8081"  # dashboard / HTTP API
    networks: [clink]
    healthcheck:
      # workers wait on this - without it, they race the coordinator's bind() and
      # exit. /api/v1/health is served as soon as the coordinator has bound its
      # control port, so passing this is a reliable readiness signal.
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8081/api/v1/health"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 2s

  worker1:
    image: clink-runtime:latest
    hostname: worker1
    depends_on:
      coordinator:
        condition: service_healthy
    command:
      - --role=worker
      - --id=worker-1
      - --coordinator-host=coordinator
      - --coordinator-port=6123
      - --data-host=worker1
      - --slots=4
      - --http-port=8082
      - --http-bind=0.0.0.0
    environment:
      # Subtask data-plane bridges bind 127.0.0.1 by default (safe for
      # single-host tests). In compose, peer subtasks live in other
      # containers and need to reach this worker via the bridge network -
      # bind 0.0.0.0 so cross-container connect() succeeds.
      CLINK_DATA_BIND_HOST: 0.0.0.0
    networks: [clink]
    restart: on-failure

  worker2:
    image: clink-runtime:latest
    hostname: worker2
    depends_on:
      coordinator:
        condition: service_healthy
    command:
      - --role=worker
      - --id=worker-2
      - --coordinator-host=coordinator
      - --coordinator-port=6123
      - --data-host=worker2
      - --slots=4
      - --http-port=8082
      - --http-bind=0.0.0.0
    environment:
      # Subtask data-plane bridges bind 127.0.0.1 by default (safe for
      # single-host tests). In compose, peer subtasks live in other
      # containers and need to reach this worker via the bridge network -
      # bind 0.0.0.0 so cross-container connect() succeeds.
      CLINK_DATA_BIND_HOST: 0.0.0.0
    networks: [clink]
    restart: on-failure

  worker3:
    image: clink-runtime:latest
    hostname: worker3
    depends_on:
      coordinator:
        condition: service_healthy
    command:
      - --role=worker
      - --id=worker-3
      - --coordinator-host=coordinator
      - --coordinator-port=6123
      - --data-host=worker3
      - --slots=4
      - --http-port=8082
      - --http-bind=0.0.0.0
    environment:
      # Subtask data-plane bridges bind 127.0.0.1 by default (safe for
      # single-host tests). In compose, peer subtasks live in other
      # containers and need to reach this worker via the bridge network -
      # bind 0.0.0.0 so cross-container connect() succeeds.
      CLINK_DATA_BIND_HOST: 0.0.0.0
    networks: [clink]
    restart: on-failure

  # One-shot: once the coordinator is healthy and Worker slots are registered,
  # submit the bundled rescale-test streaming job so the cluster shows a
  # long-lived running job (busy slots, ticking checkpoints) for the console.
  # Re-runs on every `up`; `docker compose down` clears submitted jobs.
  job-submitter:
    image: clink-runtime:latest
    depends_on:
      coordinator:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "waiting for Worker slots...";
        for i in $$(seq 1 60); do
          cap=$$(curl -sf http://coordinator:8081/api/v1/cluster | sed -n 's/.*"total_slot_capacity":\([0-9]*\).*/\1/p');
          if [ "$${cap:-0}" -ge 6 ]; then break; fi;
          sleep 1;
        done;
        echo "submitting rescale-stream job (slots=$${cap:-0})...";
        curl -s -F job_so=@/opt/clink/jobs/rescale_test_job.so -F job_name=rescale-stream http://coordinator:8081/api/v1/jobs;
        echo
    networks: [clink]
    restart: "no"

networks:
  clink:
    driver: bridge
